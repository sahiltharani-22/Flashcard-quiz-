<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Flashcard Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stars"></div>
    <div class="glowing-orb orb-1"></div>
    <div class="glowing-orb orb-2"></div>

    <header>
        <h1>BrainSpark</h1>
        <p>Test your knowledge with our interactive flashcards!</p>
    </header>

    <main class="game-container">
        <div class="card-container">
            <div class="card" id="flashcard">
                
                <div class="card-face card-front">
                    <div class="card-header">
                        <span class="question-number" id="q-num">Question 1/10</span>
                    </div>
                    <h2 class="question-text" id="q-text">Loading question...</h2>
                    <div class="options-grid" id="options-container"></div>
                </div>

                <div class="card-face card-back" id="card-back">
                    <div class="feedback-content">
                        <div class="result-icon" id="result-icon">✓</div>
                        <h2 id="feedback-title">Correct!</h2>
                        <p id="feedback-text">Great job! Moving to the next question.</p>
                        <button class="next-btn" id="next-btn">Next Question →</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <button class="team-btn" id="team-toggle">View Project Team</button>
    </footer>

    <div class="modal-overlay" id="team-modal">
        <div class="modal">
            <button class="close-btn" id="modal-close">&times;</button>
            <h3>Project Creators</h3>
            <div class="team-grid">
                <div class="team-member">Akshay Singh</div>
                <div class="team-member">Sahil Tharani</div>
                <div class="team-member">Mihir Sinh</div>
                <div class="team-member">Yuvraj Vankar</div>
                <div class="team-member">Dnyaneshwar sable</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
